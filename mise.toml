[tools]
node = "20"

[tasks."api.dev"]
run = "fastapi dev app/main.py"

[tasks.setup]
depends = ["setup.back", "setup.front"]

[tasks."api.front"]
dir = "frontend"
run = "npm run dev"

[tasks."setup.back"]
run = """
poetry install
poetry run alembic upgrade head
"""

[tasks."setup.front"]
dir = "frontend"
run = "npm install"

[tasks."front.lint"]
dir = "frontend"
run = "npm run lint"

[tasks."back.lint"]
dir = "app"
run = "poetry run ruff check"

[tasks."back.test"]
dir = "app"
run = "poetry run pytest"

[tasks."front.test"]
dir = "frontend"
run = "npm run test"